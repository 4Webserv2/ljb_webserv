<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>500 - Internal Server Error</title>
  <style>
    body {
      background-color: #f9f9f9;
      font-family: Arial, sans-serif;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    h1 {
      font-size: 6rem;
      color: #e74c3c;
      margin: 0;
    }
    h2 {
      font-size: 2rem;
      margin: 10px 0;
    }
    p {
      color: #555;
      font-size: 1rem;
      margin: 10px 0 30px;
    }
    a {
      text-decoration: none;
      background-color: #e74c3c;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      transition: 0.3s;
    }
    a:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
	<title>500 - Internal Server Error</title>
	<h1>500</h1>
	<h2>Internal Server Error</h2>
	<p>Something went wrong on our end. Please try again later.</p>
</body>
</html>
