server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10M;
    root /www;
    
    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;
    
    location / {
        index index.html;
        autoindex on;
        allow_methods GET POST DELETE;
    }
    
    location /upload {
        can_upload on;
        upload_path ./uploads;
        allow_methods POST;
    }
    
    location ~ \.py$ {
        cgi_extensions .py;
        allow_methods GET POST;
    }
}