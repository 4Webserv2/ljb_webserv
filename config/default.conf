# WebServer Default Configuration File
# Based on NGINX configuration style

# Main server block
server {
    # Listen on port 8080
    listen 8080;

    # Server name
    server_name localhost;

    # Maximum allowed size for client request bodies
    client_max_body_size 10M;

    # Default error pages
    error_page 400 /error/400.html;
    error_page 401 /error/401.html;
    error_page 403 /error/403.html;
    error_page 404 /error/404.html;
    error_page 405 /error/405.html;
    error_page 500 /error/500.html;
    error_page 501 /error/501.html;
    error_page 502 /error/502.html;
    error_page 503 /error/503.html;

    # Root location - serves static files
    location / {
        root /www;
        index index.html index.htm index.php;
        autoindex on;
        allowed_methods GET POST DELETE;
    }

    # Upload location
    location /upload {
        root /www/uploads;
        allowed_methods POST;
        upload_enable on;
        client_max_body_size 50M;
    }

    # PHP CGI location
    location ~ \.php$ {
        root /www;
        cgi_enable on;
        cgi_path /usr/bin/php-cgi;
        allowed_methods GET POST;
    }

    # Python CGI location
    location ~ \.py$ {
        root /www;
        cgi_enable on;
        cgi_path /usr/bin/python3;
        allowed_methods GET POST;
    }

    # Error pages location
    location /error {
        root /www;
        autoindex off;
        allowed_methods GET;
    }

    # CGI scripts location
    location /cgi-bin {
        root /www;
        cgi_enable on;
        allowed_methods GET POST;
    }
}

# Second server block for testing multiple ports
server {
    listen 8081;
    server_name localhost;

    client_max_body_size 5M;

    location / {
        root /www/test;
        index test.html;
        autoindex off;
        allowed_methods GET;
    }

    location /api {
        root /www/api;
        cgi_enable on;
        allowed_methods GET POST DELETE;
    }
}

